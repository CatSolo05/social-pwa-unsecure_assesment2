{% extends "layout.html" %}
{% block title %}Sign Up — SocialPWA{% endblock %}

{% block content %}
<div class="card">
  <h1>Join SocialPWA</h1>
  <p class="subtitle">Create your free account. Takes less than a minute.</p>

  <form action="/signup.html" method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <div class="form-group">
      <label for="username">Username</label>
      <input
        type="text"
        id="username"
        name="username"
        placeholder="Choose a username"
        required
        autocomplete="username"
        minlength="3"
        maxlength="30"
      />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Choose a password"
        required
        autocomplete="new-password"
      />
    </div>
    <div class="form-group">
      <label for="dob">Date of Birth</label>
      <input
        type="text"
        id="dob"
        name="dob"
        placeholder="DD/MM/YYYY"
        required
      />
    </div>
    <div class="form-group">
      <label for="bio">Bio <span class="text-muted">(optional)</span></label>
      <textarea
        id="bio"
        name="bio"
        placeholder="Tell the world about yourself..."
        maxlength="200"
      ></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Create Account</button>
  </form>

  <a href="/" class="btn btn-secondary">Already have an account? Log In</a>
</div>
{% endblock %}
